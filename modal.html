<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css?v=3">
  <script src="./js/storage.js?v=5"></script>
</head>
<body class="modal-body" style="padding: 24px;">
  
  <!-- VIEW MODE -->
  <div id="view-mode" class="hide">
    <h2 id="view-title"></h2>
    <div id="view-content" class="ql-editor p-0" style="min-height: 250px;"></div>
    <div class="modal-footer">
      <div class="meta">Atualizado por <strong id="view-author"></strong> em <span id="view-date"></span></div>
      <div style="display: flex; gap: 8px;">
        <button id="btn-ai-review" class="mod-secondary" style="color: #0079bf !important;">✨ Revisão IA</button>
        <button id="btn-edit" class="mod-secondary">Editar Conteúdo</button>
      </div>
    </div>
  </div>

  <!-- EDIT MODE -->
  <div id="edit-mode" class="hide">
    <input type="text" id="edit-title" class="title-input" placeholder="Título do Briefing">
    
    <div id="toolbar-container">
      <span class="ql-formats">
        <select class="ql-header">
          <option value="1">Título 1</option>
          <option value="2">Título 2</option>
          <option selected>Normal</option>
        </select>
      </span>
      <span class="ql-formats">
        <button class="ql-bold"></button>
        <button class="ql-italic"></button>
      </span>
      <span class="ql-formats">
        <select class="ql-color"></select>
      </span>
      <span class="ql-formats">
        <button class="ql-list" value="ordered"></button>
        <button class="ql-list" value="bullet"></button>
        <button class="ql-indent" value="-1"></button>
        <button class="ql-indent" value="+1"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-link"></button>
        <button class="ql-divider">
          <svg viewBox="0 0 18 18">
            <line class="ql-stroke" x1="3" x2="15" y1="9" y2="9" stroke="black" stroke-width="1.5"></line>
          </svg>
        </button>
      </span>
    </div>
    <div id="editor" style="min-height: 250px;"></div>
    
    <div class="modal-footer actions" style="display: flex; justify-content: space-between;">
      <button id="btn-delete" class="mod-danger" style="margin-right: auto; background-color: transparent; color: #eb5a46; border: 1px solid #eb5a46;">Excluir</button>
      <div style="display: flex; gap: 8px;">
        <button id="btn-cancel" class="mod-secondary">Cancelar</button>
        <button id="btn-save" class="mod-primary">Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script src="./js/modal.js?v=3"></script>
</body>
</html>
