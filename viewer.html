<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.core.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body class="viewer-body">
  <div id="briefing-content" class="ql-editor p-0">
    <div class="loader">Carregando briefing...</div>
  </div>
  
  <div id="briefing-footer" class="hide">
    <p>Atualizado por <strong id="updated-by"></strong> em <span id="updated-at"></span></p>
  </div>
  
  <script>
    var t = window.TrelloPowerUp.iframe();

    t.render(function(){
      return t.get('card', 'shared', 'briefing').then(function(briefing) {
        if(briefing && briefing.content && briefing.content.trim() !== '<p><br></p>') {
          document.getElementById('briefing-content').innerHTML = briefing.content;
          document.getElementById('updated-by').innerText = briefing.updatedBy || 'Membro';
          document.getElementById('updated-at').innerText = briefing.updatedAt || '';
          document.getElementById('briefing-footer').classList.remove('hide');
        } else {
          document.getElementById('briefing-content').innerHTML = '<p class="empty-state">Nenhum briefing ainda. Clique em "✏️ Editar Briefing" nos botões do cartão para adicionar.</p>';
          document.getElementById('briefing-footer').classList.add('hide');
        }

        // Adjust iframe height automatically based on content
        setTimeout(function() {
          t.sizeTo(document.body);
        }, 100);
      });
    });
  </script>
</body>
</html>
