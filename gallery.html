<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="modal-body" style="padding: 24px;">
  
  <h2 id="view-title">Galeria de Referências</h2>
  
  <div id="gallery-container" class="gallery-grid">
     <!-- Images injected here -->
  </div>
  
  <p id="empty-gallery" class="empty-state hide">Nenhuma imagem de referência salva no momento.</p>

  <div class="add-ref-bar">
    <input type="text" id="ref-url" placeholder="Cole a URL da imagem aqui (Ex: https://.../img.jpg)">
    <button id="btn-save-ref" class="mod-primary">Adicionar</button>
  </div>

  <div id="image-viewer" class="hide">
    <button id="close-viewer">✕</button>
    <img id="viewer-img" src="" />
  </div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./js/gallery.js"></script>
</body>
</html>
